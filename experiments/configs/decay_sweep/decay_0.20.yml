output:
  save_predictions: true
  save_metrics: false
  save_summaries: false
  output_directory: 'results/decay_sweep/decay_0.20'

experiment:
  name: "decay_sweep_0.20"
  recommenders:
    - multidimensional_interestingness
  mode: cheating
  include_query_text: false
  data_path: data/datasets/benchmark_mdi
  store_intermediate_states: false
  sessions:
    - benchmark_s1
    - benchmark_s2
    - benchmark_s3
  prediction_gap:
    - 1
    - 2
    - 3
    - 5
    - 10

multidimensional_interestingness:
  alpha: 0.5
  beta: 0.3
  gamma: 0.2
  association_weights:
    confidence: 0.3
    support: 0.2
    lift: 0.3
    j_measure: 0.2
  diversity_weights:
    shannon: 0.25
    simpson: 0.20
    gini: 0.20
    berger: 0.15
    mcintosh: 0.20
  rule_decay_rate: 0.2
  summary_decay_rate: 0.1

association_rules:
  enabled: true
  min_support: 0.08
  min_threshold: 0.1
  metric: confidence
  max_rules: 500

summaries:
  enabled: true
  desired_size: 10

discretization:
  enabled: false
  method: equal_width
  bins: 5
  save_params: false
  params_path: discretization_params.pkl

recommendation:
  mode: top_k
  top_k: 25
  score_threshold: 0.0

evaluation:
  metrics:
    - precision
    - recall
    - f1
    - overlap
  window_sizes:
    - 5
    - 10
    - 20
